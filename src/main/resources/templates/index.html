<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Game - Kahoot Style</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>Smarty Pants</h1>
        <p>Dare to outsmart us!</p>
    </header>

    <main>
        <div id="room-setup" class="card">
            <h2>Create or Join a Room</h2>

            <div class="form-group">
                <button id="create-room-btn" class="btn btn-primary">Create Room</button>
                <button id="join-room-btn" class="btn btn-secondary">Join Room</button>
            </div>

            <div id="create-room-form" class="hidden">
                <h3>Create New Room</h3>
                <div class="form-group">
                    <label for="age-group">Age Group:</label>
                    <select id="age-group" class="form-control">
                        <option value="">Select Age Group</option>
                        <option value="children">Children (6-12)</option>
                        <option value="teens">Teens (13-19)</option>
                        <option value="adults">Adults (20+)</option>
                        <option value="mixed">Mixed Ages</option>
                    </select>
                    <input type="text" id="custom-age-group" class="form-control hidden" placeholder="Custom Age Group">
                </div>

                <div class="form-group">
                    <label for="topic">Topic:</label>
                    <select id="topic" class="form-control">
                        <option value="">Select Topic</option>
                        <option value="general">General Knowledge</option>
                        <option value="science">Science</option>
                        <option value="history">History</option>
                        <option value="geography">Geography</option>
                    </select>
                    <input type="text" id="custom-topic" class="form-control hidden" placeholder="Custom Topic">
                </div>

                <div class="form-group">
                    <button id="start-game-btn" class="btn btn-success">Start Game</button>
                </div>
            </div>

            <div id="join-room-form" class="hidden">
                <h3>Join Existing Room</h3>
                <div class="form-group">
                    <label for="room-code">Room Code:</label>
                    <input type="text" id="room-code" class="form-control" maxlength="6" placeholder="Enter 6-digit code">
                </div>
                <div class="form-group">
                    <button id="join-btn" class="btn btn-success">Join Room</button>
                </div>
            </div>

            <div id="room-created" class="hidden">
                <h3>Room Created Successfully!</h3>
                <p>Your room code is: <span id="room-number" class="room-code"></span></p>
                <p>Share this code with your friends to join.</p>
            </div>
        </div>
    </main>
</div>

<script src="/js/script.js"></script>
</body>
</html>
