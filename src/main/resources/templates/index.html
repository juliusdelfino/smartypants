<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Game</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Home Screen -->
    <div id="home-screen" class="screen">
        <div class="logo-container">
            <img
                    src="/images/smarty-big-no-bg.png"
                    alt="Smarty Pants Logo"
                    class="smarty-logo"
            />
        </div>
        <div class="action-buttons">
            <button id="create-room-btn" class="btn btn-primary">Create Room</button>
            <button id="join-room-btn" class="btn btn-secondary">Join Room</button>
        </div>
    </div>

    <!-- Create Room Screen -->
    <div id="create-room-screen" class="screen hidden">
        <div class="form-container">
            <h2>Create Room</h2>
            
            <div class="form-group">
                <label for="player-name-create">Your Name</label>
                <input type="text" id="player-name-create" placeholder="Enter your name" maxlength="20">
            </div>

            <div class="form-group">
                <label for="age-group">Age Group</label>
                <div class="editable-select">
                    <input type="text" id="age-group" list="age-group-options" placeholder="Select or type custom age group">
                    <datalist id="age-group-options">
                        <option value="Kids (6-12)"></option>
                        <option value="Teens (13-17)"></option>
                        <option value="Adults (18+)"></option>
                        <option value="All Ages"></option>
                    </datalist>
                </div>
            </div>

            <div class="form-group">
                <label for="topic">Topic</label>
                <div class="editable-select">
                    <input type="text" id="topic" list="topic-options" placeholder="Select or type custom topic">
                    <datalist id="topic-options">
                        <option value="General Knowledge"></option>
                        <option value="Science"></option>
                        <option value="History"></option>
                        <option value="Sports"></option>
                        <option value="Entertainment"></option>
                        <option value="Geography"></option>
                    </datalist>
                </div>
            </div>

            <button id="create-btn" class="btn btn-primary">Create</button>
            <button id="create-back-btn" class="btn btn-back">← Back</button>
        </div>
    </div>

    <!-- Room Created/Lobby Screen -->
    <div id="room-created-screen" class="screen hidden">
        <div class="room-code-container">
            <h2 id="room-created-title">Room Created!</h2>
            <div class="room-code-display">
                <span id="room-code-text"></span>
            </div>
            <p class="room-info">Share this code with friends!</p>
            
            <div class="room-details">
                <p><strong>Age Group:</strong> <span id="room-age-group"></span></p>
                <p><strong>Topic:</strong> <span id="room-topic"></span></p>
                <p><strong>Your Name:</strong> <span id="player-name-display"></span></p>
            </div>
            
            <div class="players-list-container">
                <h3>Players (<span id="player-count">0</span>)</h3>
                <ul id="players-list" class="players-list"></ul>
            </div>
            
            <div id="host-controls" class="host-controls hidden">
                <button id="start-game-btn" class="btn btn-primary">Start Game</button>
            </div>
            
            <p id="waiting-message" class="waiting-message">Waiting for host to start...</p>
            <button id="created-back-btn" class="btn btn-back">← Back</button>
        </div>
    </div>

    <!-- Join Room Screen -->
    <div id="join-room-screen" class="screen hidden">
        <div class="form-container">
            <h2>Join Room</h2>
            
            <div class="form-group">
                <label for="player-name-join">Your Name</label>
                <input type="text" id="player-name-join" placeholder="Enter your name" maxlength="20">
            </div>

            <div class="form-group">
                <label for="room-code-input">Enter Room Code</label>
                <input type="text" id="room-code-input" maxlength="6" placeholder="000000">
            </div>

            <button id="join-btn" class="btn btn-primary">Join</button>
            <button id="join-back-btn" class="btn btn-back">← Back</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
        <!-- Session header: small logo, room code and player name -->
        <div class="session-header">
            <img src="/images/smarty-big-no-bg.png" alt="Smarty Logo" class="smarty-logo small" />

                <div class="header-room-code">Room: <span id="header-room-code-text"></span></div>
                <div class="header-player-name">Player: <span id="header-player-name-text"></span> -- <span id="header-player-score-text"></span></div>
                <button id="leave-btn" class="btn btn-secondary">Leave</button>

        </div>

        <div class="game-header">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="game-info">
                <span id="question-number">Question 1/10</span>
                <span id="timer-display">⏱️ 30</span>
            </div>
        </div>

        <div class="question-container">
            <div id="question-text" class="question-text"></div>
            <div id="timer-bar" class="timer-bar">
                <div id="timer-fill" class="timer-fill"></div>
            </div>
        </div>

        <div id="answers-container" class="answers-container">
            <!-- Answers will be dynamically inserted -->
        </div>

        <div id="feedback-overlay" class="feedback-overlay hidden">
            <div id="feedback-content" class="feedback-content">
                <div id="feedback-icon" class="feedback-icon"></div>
                <p id="feedback-text"></p>
                <div id="answer-results" class="answer-results"></div>
                <button id="next-question-btn" class="btn btn-primary hidden">Next Question</button>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <div class="game-over-container">
            <h2>Game Over!</h2>
            <div class="final-scoreboard">
                <h3>Final Scores</h3>
                <div id="final-scores-list" class="final-scores-list"></div>
            </div>
            <button id="play-again-btn" class="btn btn-primary">Play Again</button>
            <button id="home-btn" class="btn btn-secondary">Home</button>
        </div>
    </div>

    <!-- Connection Status -->
    <div id="connection-status" class="connection-status hidden">
        <span id="status-text">Connecting...</span>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
